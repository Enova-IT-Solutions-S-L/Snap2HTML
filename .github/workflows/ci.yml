name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  build:
    name: Build & Validate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Snap2HTML.sln

      - name: Build Release
        run: dotnet build Snap2HTML.sln -c Release --no-restore -warnaserror

      - name: Verify publish (single-file)
        run: |
          dotnet publish Snap2HTML/Snap2HTML.csproj -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o ./publish-test

      - name: Verify output exists
        run: |
          if (-not (Test-Path ./publish-test/Snap2HTML.exe)) {
            Write-Error "Snap2HTML.exe not found in publish output"
            exit 1
          }
          $size = (Get-Item ./publish-test/Snap2HTML.exe).Length
          Write-Host "Snap2HTML.exe size: $([math]::Round($size / 1MB, 2)) MB"
