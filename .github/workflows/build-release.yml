name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v3.0.0)'
        required: true
        default: 'v3.0.0'
      create_release:
        description: 'Create GitHub Release?'
        required: true
        type: boolean
        default: false
      self_contained:
        description: 'Self-contained (no .NET runtime needed)?'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      VERSION: ${{ inputs.version || 'latest' }}
      SELF_CONTAINED: ${{ inputs.self_contained == '' && 'true' || inputs.self_contained }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version from csproj (auto mode)
        if: ${{ env.VERSION == 'latest' }}
        shell: pwsh
        run: |
          [xml]$proj = Get-Content Snap2HTML/Snap2HTML.csproj
          $ver = $proj.Project.PropertyGroup.Version
          echo "VERSION=v$ver" >> $env:GITHUB_ENV

      - name: Restore dependencies
        run: dotnet restore Snap2HTML.sln

      - name: Build Release
        run: dotnet build Snap2HTML.sln -c Release --no-restore

      - name: Publish
        run: |
          dotnet publish Snap2HTML/Snap2HTML.csproj -c Release -r win-x64 `
            --self-contained ${{ env.SELF_CONTAINED }} `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o ./publish

      - name: List publish output
        run: Get-ChildItem ./publish -Recurse | Select-Object FullName, Length

      - name: Create ZIP artifact
        run: Compress-Archive -Path ./publish/* -DestinationPath ./Snap2HTML-${{ env.VERSION }}-win-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snap2HTML-${{ env.VERSION }}-win-x64
          path: ./Snap2HTML-${{ env.VERSION }}-win-x64.zip
          retention-days: 90

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Snap2HTML ${{ env.VERSION }}
          body: |
            ## Snap2HTML ${{ env.VERSION }}

            ### Download
            - **Snap2HTML-${{ env.VERSION }}-win-x64.zip** — Single-file executable for Windows x64

            ### What's included
            - `Snap2HTML.exe` — Main application
            - `template.html` — HTML report template
            - `ReadMe.txt` — Documentation
          files: ./Snap2HTML-${{ env.VERSION }}-win-x64.zip
          draft: false
          prerelease: false
